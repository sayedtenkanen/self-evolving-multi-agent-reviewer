name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_DEFAULT: "3.12"

jobs:
  secret-scan:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}

      - name: Install detect-secrets
        run: pip install detect-secrets

      - name: Scan for secrets
        run: |
          detect-secrets scan --all-files \
            --exclude-files '\.venv/' \
            --exclude-files 'semar\.egg-info/' \
            --exclude-files '__pycache__/' \
            --exclude-files '\.git/' \
            --exclude-files '\.pytest_cache/' \
            --exclude-files '\.ruff_cache/' \
            --exclude-files 'tests/security/' \
            > .secrets.baseline

      - name: Verify no secrets found
        run: |
          detect-secrets audit .secrets.baseline

  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit dependencies
        run: pip-audit --desc

  security-tests:
    name: Security Test Suite
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        test-suite:
          - tests/security/test_secrets.py
          - tests/security/test_injection.py
          - tests/security/test_exfiltration.py
          - tests/security/test_prompt_injection.py
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run ${{ matrix.test-suite }}
        run: python -m pytest ${{ matrix.test-suite }} -v --tb=long

  sast:
    name: Static Application Security Testing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit security scan
        run: |
          bandit -r semar/ \
            --severity-level medium \
            --confidence-level medium \
            -f json \
            -o bandit-report.json \
            || true

      - name: Display results
        if: always()
        run: bandit -r semar/ --severity-level medium --confidence-level medium -f screen || true

      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bandit-report
          path: bandit-report.json
